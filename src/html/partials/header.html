<header id="header" class="site-header">
  <div class="container mx-auto px-4 py-4 flex items-center justify-between">
    <!-- Логотип -->
    <a href="index.html" class="text-xl font-bold text-gray-900"> FlowMarketing </a>

    <!-- Десктопное меню -->
    <nav class="hidden md:flex items-center gap-6">
      <a href="index.html" class="text-gray-700 hover:text-blue-600 transition">Главная</a>
      <a href="#about" class="text-gray-700 hover:text-blue-600 transition">О нас</a>
      <a href="#services" class="text-gray-700 hover:text-blue-600 transition">Услуги</a>
      <a href="#contact" class="text-gray-700 hover:text-blue-600 transition">Контакты</a>
    </nav>

    <!-- Кнопка мобильного меню -->
    <button
      id="mobile-menu-btn"
      type="button"
      class="md:hidden p-2 text-gray-700 hover:text-blue-600 focus:outline-none"
      aria-label="Открыть меню"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 6h16M4 12h16M4 18h16"
        />
      </svg>
    </button>
  </div>

  <!-- Мобильное меню (панель) -->
  <div
    id="mobile-menu"
    class="fixed inset-0 z-50 hidden md:hidden"
    aria-label="Мобильная навигация"
  >
    <!-- Затемнение фона -->
    <div class="mobile-menu-overlay absolute inset-0 bg-black/50"></div>

    <!-- Панель меню -->
    <div
      class="mobile-menu-panel absolute right-0 top-0 h-full w-64 bg-white shadow-xl transform translate-x-full transition-transform duration-300 ease-in-out"
    >
      <div class="p-4 flex justify-end">
        <button
          id="mobile-menu-close"
          type="button"
          class="p-2 text-gray-700 hover:text-blue-600 focus:outline-none"
          aria-label="Закрыть меню"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>

      <nav class="flex flex-col gap-2 px-4">
        <a
          href="index.html"
          class="mobile-menu-link py-3 text-gray-700 hover:text-blue-600 border-b border-gray-100"
          >Главная</a
        >
        <a
          href="#about"
          class="mobile-menu-link py-3 text-gray-700 hover:text-blue-600 border-b border-gray-100"
          >О нас</a
        >
        <a
          href="#services"
          class="mobile-menu-link py-3 text-gray-700 hover:text-blue-600 border-b border-gray-100"
          >Услуги</a
        >
        <a
          href="#contact"
          class="mobile-menu-link py-3 text-gray-700 hover:text-blue-600 border-b border-gray-100"
          >Контакты</a
        >
      </nav>
    </div>
  </div>
</header>
